<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0ea5e9"/>

  <!-- Drone body (center hex) -->
  <rect x="24" y="24" width="16" height="16" rx="3" fill="#fff"/>
  <!-- Camera lens dot -->
  <circle cx="32" cy="32" r="3" fill="#0ea5e9"/>

  <!-- Top-left arm -->
  <rect x="10" y="10" width="16" height="4" rx="2" fill="#fff" transform="rotate(45 18 12)"/>
  <!-- Top-right arm -->
  <rect x="38" y="10" width="16" height="4" rx="2" fill="#fff" transform="rotate(-45 46 12)"/>
  <!-- Bottom-left arm -->
  <rect x="10" y="50" width="16" height="4" rx="2" fill="#fff" transform="rotate(-45 18 52)"/>
  <!-- Bottom-right arm -->
  <rect x="38" y="50" width="16" height="4" rx="2" fill="#fff" transform="rotate(45 46 52)"/>

  <!-- Top-left rotor -->
  <ellipse cx="12" cy="12" rx="8" ry="3" fill="#bae6fd" opacity="0.85" transform="rotate(45 12 12)"/>
  <!-- Top-right rotor -->
  <ellipse cx="52" cy="12" rx="8" ry="3" fill="#bae6fd" opacity="0.85" transform="rotate(-45 52 12)"/>
  <!-- Bottom-left rotor -->
  <ellipse cx="12" cy="52" rx="8" ry="3" fill="#bae6fd" opacity="0.85" transform="rotate(-45 12 52)"/>
  <!-- Bottom-right rotor -->
  <ellipse cx="52" cy="52" rx="8" ry="3" fill="#bae6fd" opacity="0.85" transform="rotate(45 52 52)"/>
</svg>
